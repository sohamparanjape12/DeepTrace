<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer lens ring -->
  <circle cx="13" cy="13" r="10" fill="none" stroke="#dc2626" stroke-width="2.5" />
  
  <!-- Handle -->
  <line x1="20" y1="20" x2="28" y2="28" stroke="#dc2626" stroke-width="4" stroke-linecap="round" />

  <!-- Fingerprint paths (Modern & Minimal style) -->
  <!-- Inner loop -->
  <path d="M 11 16 V 12 A 2 2 0 0 1 15 12 V 15" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Middle loop -->
  <path d="M 8.5 15 V 11 A 4.5 4.5 0 0 1 17.5 11 V 13" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" />
  <!-- Small dot accent -->
  <circle cx="17.5" cy="16" r="1" fill="#dc2626" />
  
  <!-- Outer loop -->
  <path d="M 6 14 V 10 A 7 7 0 0 1 20 10 V 12" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" />
</svg>
